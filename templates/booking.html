{% extends "base.html" %}{% block content %}<div class="public-wrap"><div class="public-card"><div class="wordmark center">BlackSquare</div><h1>Онлайн-запись</h1><p>Выберите услугу, мастера и свободное окно.</p><form method="post"><input name="client_name" placeholder="Ваше имя" required><input name="phone" placeholder="Телефон" required><input name="car" placeholder="Автомобиль"><input name="plate_number" placeholder="Госномер авто"><select name="service_id" id="service" required><option value="">Услуга</option>{% for s in services %}<option value="{{ s.id }}">{{ s.name }} — {{ s.duration_min }} мин</option>{% endfor %}</select><select name="employee_id" id="employee" required><option value="">Сначала выберите услугу</option></select><input type="date" name="appointment_date" id="date" required><select name="start_time" id="slot" required><option value="">Свободные окна появятся тут</option></select><textarea name="comment" placeholder="Комментарий"></textarea><button>Записаться</button></form></div></div><script>async function masters(){let s=service.value;employee.innerHTML='<option>Загрузка...</option>';if(!s)return;let r=await fetch('/api/masters?service_id='+s);let d=await r.json();employee.innerHTML='<option value="">Мастер</option>';d.forEach(x=>{let o=document.createElement('option');o.value=x.id;o.textContent=x.name;employee.appendChild(o);});slots();}async function slots(){let s=service.value,e=employee.value,d=date.value;slot.innerHTML='<option>Загрузка...</option>';if(!s||!e||!d){slot.innerHTML='<option value="">Выберите услугу, мастера и дату</option>';return;}let r=await fetch(`/api/slots?service_id=${s}&employee_id=${e}&date=${d}`);let data=await r.json();slot.innerHTML='';if(!data.length){slot.innerHTML='<option value="">Свободных окон нет</option>';return;}data.forEach(x=>{let o=document.createElement('option');o.value=x.start;o.textContent=x.start+'–'+x.end;slot.appendChild(o);});}service.onchange=masters;employee.onchange=slots;date.onchange=slots;</script>{% endblock %}

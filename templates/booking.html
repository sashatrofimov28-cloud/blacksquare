{% extends "base.html" %}
{% block content %}
<div class="public-wrap">
  <div class="public-card">
    <div class="wordmark center">BlackSquare</div>
    <h1>Онлайн-запись</h1>
    <p>Выберите одну или несколько услуг, мастера и свободное окно.</p>
    <form method="post" id="booking-form">
      <input name="client_name" placeholder="Ваше имя" required>
      <input name="phone" placeholder="Телефон" required>
      <input name="car" class="js-car-ac" placeholder="Автомобиль">
      <input name="plate_number" placeholder="Госномер авто">
      <div class="booking-services" id="serviceChecks">
        <p class="booking-services-label">Услуги *</p>
        {% for group in service_groups %}
        <div class="booking-service-group">
          <p class="booking-service-group-title">{{ group.category.name }}</p>
          {% for s in group.services %}
          <label class="check booking-service-check">
            <input type="checkbox" name="service_ids" value="{{ s.id }}">
            {{ s.name }} — {{ service_price_label(s.base_price) }}, {{ s.duration_min }} мин
          </label>
          {% endfor %}
        </div>
        {% endfor %}
      </div>
      <select name="employee_id" id="employee" required disabled>
        <option value="">Сначала выберите услугу</option>
      </select>
      <input type="date" name="appointment_date" id="date" value="{{ default_date }}" min="{{ default_date }}" required>
      <select name="start_time" id="slot" required disabled>
        <option value="">Свободные окна появятся тут</option>
      </select>
      <textarea name="comment" placeholder="Комментарий"></textarea>
      <button type="submit" id="submit-btn" disabled>Записаться</button>
    </form>
  </div>
</div>
<script>
const form = document.getElementById('booking-form');
const submitBtn = document.getElementById('submit-btn');
const serviceChecks = document.getElementById('serviceChecks');
const employee = document.getElementById('employee');
const date = document.getElementById('date');
const slot = document.getElementById('slot');

function selectedServiceIds() {
  return [...serviceChecks.querySelectorAll('input[name="service_ids"]:checked')].map(el => el.value);
}

function serviceQuery() {
  return selectedServiceIds().map(id => 'service_ids=' + encodeURIComponent(id)).join('&');
}

function setLoading(select, text) {
  select.innerHTML = '';
  const o = document.createElement('option');
  o.value = '';
  o.textContent = text;
  o.disabled = true;
  o.selected = true;
  select.appendChild(o);
  select.disabled = true;
  updateSubmit();
}

function updateSubmit() {
  const ready = selectedServiceIds().length && employee.value && date.value && slot.value
    && !employee.disabled && !slot.disabled;
  submitBtn.disabled = !ready;
}

async function masters() {
  const ids = selectedServiceIds();
  employee.disabled = true;
  slot.disabled = true;
  slot.innerHTML = '<option value="">Выберите услуги, мастера и дату</option>';
  if (!ids.length) {
    employee.innerHTML = '<option value="">Сначала выберите услугу</option>';
    updateSubmit();
    return;
  }
  setLoading(employee, 'Загрузка мастеров...');
  try {
    const r = await fetch('/api/masters?' + serviceQuery());
    const d = await r.json();
    employee.innerHTML = '<option value="">Мастер</option>';
    d.forEach(x => {
      const o = document.createElement('option');
      o.value = x.id;
      o.textContent = x.name;
      employee.appendChild(o);
    });
    employee.disabled = false;
  } catch (e) {
    employee.innerHTML = '<option value="">Не удалось загрузить мастеров</option>';
  }
  slots();
}

async function slots() {
  const ids = selectedServiceIds();
  const e = employee.value, d = date.value;
  slot.disabled = true;
  if (!ids.length || !e || !d) {
    slot.innerHTML = '<option value="">Выберите услуги, мастера и дату</option>';
    updateSubmit();
    return;
  }
  setLoading(slot, 'Загрузка окон...');
  try {
    const r = await fetch(`/api/slots?${serviceQuery()}&employee_id=${encodeURIComponent(e)}&date=${encodeURIComponent(d)}`);
    const data = await r.json();
    slot.innerHTML = '';
    if (!data.length) {
      slot.innerHTML = '<option value="">Свободных окон нет</option>';
      slot.disabled = true;
      updateSubmit();
      return;
    }
    slot.innerHTML = '<option value="">Выберите время</option>';
    data.forEach(x => {
      const o = document.createElement('option');
      o.value = x.start;
      o.textContent = x.start + '–' + x.end;
      slot.appendChild(o);
    });
    slot.disabled = false;
  } catch (e) {
    slot.innerHTML = '<option value="">Не удалось загрузить окна</option>';
  }
  updateSubmit();
}

serviceChecks.addEventListener('change', masters);
employee.onchange = slots;
date.onchange = slots;
slot.onchange = updateSubmit;
form.addEventListener('submit', e => {
  if (!selectedServiceIds().length) {
    e.preventDefault();
    alert('Выберите хотя бы одну услугу.');
    return;
  }
  if (submitBtn.disabled || !slot.value) {
    e.preventDefault();
    alert('Дождитесь загрузки и выберите свободное время.');
  }
});
updateSubmit();
</script>
{% endblock %}

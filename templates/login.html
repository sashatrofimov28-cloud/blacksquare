{% extends "base.html" %}
{% block content %}
<div class="login-card">
  <div class="wordmark center">BlackSquare</div>
  <p>Вход</p>
  <form method="post" action="{{ url_for('login') }}" id="loginForm">
    <label>Логин</label>
    <input name="username" id="loginUsername" placeholder="Логин" required autocomplete="username">
    <label>Пароль</label>
    <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password">
    <label class="check login-remember">
      <input type="checkbox" name="remember" value="1" checked>
      <span>Оставаться в системе</span>
    </label>
    <button>Войти</button>
  </form>
</div>
<script>
(function () {
  const key = 'bs_login_username';
  const input = document.getElementById('loginUsername');
  const saved = localStorage.getItem(key);
  if (saved && input && !input.value) input.value = saved;
  document.getElementById('loginForm')?.addEventListener('submit', () => {
    if (input?.value) localStorage.setItem(key, input.value.trim());
  });
})();
</script>
{% endblock %}

{% extends "base.html" %}{% block content %}<header class="top"><h1>Моя зарплата</h1></header><section class="cards simple"><div class="card"><span>Всего</span><strong>{{ "%.0f"|format(total) }} ₽</strong></div></section><div class="panel"><table><tr><th>Период</th><th>Сумма</th><th>Комментарий</th><th>Дата</th></tr>{% for r in rows %}<tr><td>{{ r.period }}</td><td>{{ "%.0f"|format(r.amount) }} ₽</td><td>{{ r.comment }}</td><td>{{ r.created_at }}</td></tr>{% endfor %}</table></div>{% endblock %}

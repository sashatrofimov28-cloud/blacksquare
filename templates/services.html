{% extends "base.html" %}
{% block content %}
<header class="top">
  <h1>Услуги</h1>
  <p>Цена указывается «от» — итоговая сумма вписывается при закрытии заказа.</p>
</header>
<div class="panel">
  <form method="post" class="form-grid">
    <input name="name" placeholder="Название" required>
    <input name="duration_min" type="number" placeholder="Тайминг минут" required>
    <input name="base_price" type="number" placeholder="Цена от, ₽">
    <input name="comment" placeholder="Комментарий">
    <button>Создать</button>
  </form>
</div>
<div class="panel">
  <table>
    <tr><th>Услуга</th><th>Тайминг</th><th>Цена от</th><th>Активна</th><th></th><th></th></tr>
    {% for r in rows %}
    <tr>
      <form method="post" action="{{ url_for('service_update', sid=r.id) }}" style="display:contents">
        <td><input name="name" value="{{ r.name }}"></td>
        <td><input name="duration_min" type="number" value="{{ r.duration_min }}"></td>
        <td><input name="base_price" type="number" value="{{ r.base_price }}"></td>
        <td><label class="check"><input type="checkbox" name="active" {% if r.active %}checked{% endif %}> да</label></td>
        <td><button class="ghost">Сохранить</button></td>
      </form>
      <td>
        <form method="post" action="{{ url_for('service_delete', sid=r.id) }}">
          <button class="danger">Удалить</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
